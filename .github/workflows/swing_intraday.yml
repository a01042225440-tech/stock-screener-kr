name: Swing Intraday Monitor

on:
  schedule:
    # 매 20분(UTC 0~6시 = KST 09:00~15:40), 월~금. 장중 매도 즉시 점검 + 14:40 매수신호.
    - cron: '*/20 0-6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swing-intraday
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas requests flask

      - name: Run intraday monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python swing_intraday.py

      - name: Persist positions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add swing_positions.json
          if git diff --staged --quiet; then
            echo "no position change"
          else
            git commit -m "chore: swing positions ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push || true
          fi
