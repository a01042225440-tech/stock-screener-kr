name: Swing Intraday Monitor

on:
  schedule:
    # ※ GitHub */10 고빈도 스케줄은 throttle로 거의 안 뜸. → '하루 2회 시작' 방식으로 전환.
    #   02:00 UTC(11:00 KST) 1차 + 03:30 UTC(12:30 KST) 백업 — 시작되면 종일(16:50까지) 상주.
    #   하루 단발 크론은 비교적 잘 떠서, 둘 중 하나만 떠도 15:20 매수·16:40 보고 보장.
    - cron: '0 2 * * 1-5'
    - cron: '30 3 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swing-intraday
  cancel-in-progress: false   # 1차가 돌고 있으면 백업은 큐잉(중복 발송은 buy_done/report_done로 차단)

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360       # 종일 상주(최대 6시간)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas requests flask openpyxl

      - name: "Run all-day monitor (resident: sells + 15:20 buy + 16:40 report)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LONG_RUN: '1'
          MONITOR_SLEEP: '150'   # 2.5분 간격 점검
        run: python swing_intraday.py

      - name: Persist positions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add swing_positions.json momentum_positions.json trades_log.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "chore: positions/log ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push || true
          fi
