name: Swing Intraday Monitor

on:
  schedule:
    # 매 5분(GitHub 크론 최소, UTC 0~7시 = KST 09:00~16:55), 월~금.
    # 09:00~15:30 매도/손절·15:20 매수알림 / 16:40 일일보고. 잡 내부 1분 미니루프.
    - cron: '*/5 0-7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swing-intraday
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (openpyxl for 16:40 report)
        run: pip install numpy pandas requests flask openpyxl

      - name: Run intraday monitor (1-min loop within the 5-min slot)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MONITOR_ITERS: '4'     # 4회 점검
          MONITOR_SLEEP: '60'    # 60초 간격 → ~3분 커버, 다음 5분 틱이 이어받음
        run: python swing_intraday.py

      - name: Persist positions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add swing_positions.json momentum_positions.json trades_log.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "chore: positions/log ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push || true
          fi
