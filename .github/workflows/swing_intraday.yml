name: Swing Intraday Monitor

on:
  schedule:
    # ※ GitHub 스케줄이 매일 ~4.5시간 지연 실행됨(11:00→15:06~15:46 KST). 그래서 매수알림(15:18)이
    #   마감 즈음에 옴. → 크론을 '4.5h 앞당겨 + 여러 개' 깔아 지연돼도 15:18엔 잡이 돌게 함.
    #   (공개 repo라 Actions 무제한. 상주잡은 16:50까지 돌고 buy_done로 중복발송 차단)
    #   UTC22~23시(=KST 다음날 새벽)는 요일 0-4, UTC00~04시는 1-5 로 KST 월~금 커버.
    - cron: '0 22 * * 0-4'   # +4.5h → ~12:00 KST 시작
    - cron: '0 23 * * 0-4'   # → ~13:00 KST
    - cron: '0 0 * * 1-5'    # → ~14:00 KST
    - cron: '0 1 * * 1-5'    # → ~15:00 KST
    - cron: '0 2 * * 1-5'    # 기존(지연시 ~15:06)
    - cron: '30 3 * * 1-5'   # 기존(지연시 ~16:00, 보고 보장)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swing-intraday
  cancel-in-progress: false   # 1차가 돌고 있으면 백업은 큐잉(중복 발송은 buy_done/report_done로 차단)

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360       # 종일 상주(최대 6시간)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas requests flask openpyxl

      - name: "Run all-day monitor (resident: sells + 15:20 buy + 16:40 report)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LONG_RUN: '1'
          MONITOR_SLEEP: '150'   # 2.5분 간격 점검
        run: python swing_intraday.py

      - name: Persist positions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add swing_positions.json momentum_positions.json trades_log.json
          if git diff --staged --quiet; then
            echo "no change"
          else
            git commit -m "chore: positions/log ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push || true
          fi
