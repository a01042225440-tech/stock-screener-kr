name: Daily Stock Notify

on:
  # ※ 스케줄 비활성화: 15:20 통합 매수알림은 swing_intraday(매 5분, 정시 신뢰성↑)가 처리.
  #   이 워크플로는 수동 백업용으로만 유지(GitHub 1일1회 스케줄은 지연이 커서 제외).
  workflow_dispatch:   # 수동 실행(백업)
    inputs:
      send_now:
        description: '즉시 발송(대기 안함)'
        required: false
        default: 'false'

permissions:
  contents: write   # momentum_positions.json 영속화

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 최대 ~4.4h 대기 + 스캔 여유
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas requests flask

      - name: Wait until 15:20 KST (schedule, or manual unless send_now)
        if: github.event_name == 'schedule' || github.event.inputs.send_now != 'true'
        run: |
          TARGET=$(date -u -d "$(date -u +%Y-%m-%d) 06:20:00" +%s)
          NOW=$(date -u +%s)
          DIFF=$((TARGET - NOW))
          echo "now(UTC)=$(date -u) target=06:20UTC diff=${DIFF}s"
          if [ $DIFF -gt 0 ] && [ $DIFF -lt 18000 ]; then
            echo "Sleeping ${DIFF}s to hit 15:20 KST (장마감 10분전, 동시호가 직전)..."
            sleep $DIFF
          else
            echo "Past target or out-of-range -> 즉시 발송 (오늘 데이터 기준)"
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify_send.py

      - name: Persist positions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master || true
          git add momentum_positions.json swing_positions.json trades_log.json
          if git diff --staged --quiet; then
            echo "no position change"
          else
            git commit -m "chore: positions ($(date -u +%Y-%m-%d))"
            git push || true
          fi
